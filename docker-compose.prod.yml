# ============================================================
# 生产环境 docker-compose
#
# 用法：
#   1. 把 backend/.env.production 配好（数据库密码 / API keys / 等）
#   2. docker compose -f docker-compose.prod.yml --env-file backend/.env.production up -d
#   3. 首次部署可以单独跑 init，等迁移完成再 up 其他服务：
#      docker compose -f docker-compose.prod.yml run --rm init
#      docker compose -f docker-compose.prod.yml up -d
#
# 注意：
#   - Postgres 用 pgvector 镜像（普通 postgres:16-alpine 没装 vector 扩展）
#   - 不挂载源码 volumes（生产用镜像里的代码）
#   - 加 init 容器自动跑 alembic + seed
# ============================================================

version: '3.8'

x-backend-env: &backend-env
  POSTGRES_SERVER: ${POSTGRES_SERVER:-postgres}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?need POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB:-ai_content_hub}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
  SECRET_KEY: ${SECRET_KEY:?need SECRET_KEY}
  # LLM / Embedding keys
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
  EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-dashscope}
  EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-https://dashscope.aliyuncs.com/compatible-mode/v1}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-v3}
  EMBEDDING_DIM: ${EMBEDDING_DIM:-1024}
  LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
  TOPHUB_API_KEY: ${TOPHUB_API_KEY}
  # 阿里云短信
  ALIYUN_SMS_ACCESS_KEY_ID: ${ALIYUN_SMS_ACCESS_KEY_ID}
  ALIYUN_SMS_ACCESS_KEY_SECRET: ${ALIYUN_SMS_ACCESS_KEY_SECRET}
  ALIYUN_SMS_SIGN_NAME: ${ALIYUN_SMS_SIGN_NAME}
  ALIYUN_SMS_TEMPLATE_CODE: ${ALIYUN_SMS_TEMPLATE_CODE}
  # CORS / 可信主机
  BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-["*"]}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:-["*"]}
  # Exa API（微信公众号搜索）
  EXA_API_KEY: ${EXA_API_KEY:-}
  # HTTP 代理（访问境外网站）
  HTTP_PROXY: ${HTTP_PROXY:-}
  # X (Twitter) 可选
  TWITTER_AUTH_TOKEN: ${TWITTER_AUTH_TOKEN:-}
  TWITTER_CT0: ${TWITTER_CT0:-}

services:

  # ─── Postgres + pgvector ───
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ai_content_hub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 首次启动自动 CREATE EXTENSION vector
      - ./backend/scripts/init_pgvector.sql:/docker-entrypoint-initdb.d/init_pgvector.sql:ro
    networks:
      - aichub
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ai_content_hub}"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - aichub
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 6

  # ─── init: 一次性跑 alembic + seed 然后退出 ───
  init:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      <<: *backend-env
      ROLE: init
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aichub
    restart: "no"

  # ─── Backend (FastAPI) ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *backend-env
      ROLE: web
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    networks:
      - aichub
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Celery Worker ───
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["celery", "-A", "app.core.celery_app", "worker", "--loglevel=info", "--concurrency=2"]
    environment:
      <<: *backend-env
      ROLE: worker
    volumes:
      # X cookie 文件挂载（playwright_x_adapter 用）
      - ./backend/secrets:/app/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    networks:
      - aichub
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.core.celery_app inspect ping --timeout=10 2>/dev/null | grep -q OK || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

  # ─── Celery Beat (定时调度) ───
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["celery", "-A", "app.core.celery_app", "beat", "--loglevel=info"]
    environment:
      <<: *backend-env
      ROLE: beat
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      init:
        condition: service_completed_successfully
    networks:
      - aichub
    healthcheck:
      disable: true

  # ─── Frontend + nginx (生产构建产物) ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production            # 走 multi-stage 的 production 那段
    restart: unless-stopped
    ports:
      - "${WEB_HTTP_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - aichub

volumes:
  postgres_data:
  redis_data:

networks:
  aichub:
    driver: bridge
